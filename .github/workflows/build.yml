name: Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: MoodleConverter.exe
            build_cmd: pyinstaller --onefile --windowed --name MoodleConverter --add-data "universal_moodle_converter_v3_stable.py;." converter_gui.py
          - os: macos-latest
            artifact_name: MoodleConverter.app
            build_cmd: pyinstaller --windowed --name MoodleConverter --add-data "universal_moodle_converter_v3_stable.py:." converter_gui.py

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt5 PyQtWebEngine lxml python-docx docxlatex pyinstaller

      - name: Install PyQt5 (macOS specific)
        if: runner.os == 'macOS'
        run: pip install PyQt5==5.15.11 PyQtWebEngine

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MoodleConverter.exe/MoodleConverter.exe
            MoodleConverter.app/MoodleConverter.app
          draft: false
          prerelease: false
